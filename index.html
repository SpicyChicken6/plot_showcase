<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive bioinformatics figure showcase with live plot rendering, attached code, and downloadable test datasets."
    />
    <meta name="theme-color" content="#f5efe3" />
    <title>Omics Figure Atlas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/app.css" />
  </head>
  <body>
    <div class="background-orb orb-a"></div>
    <div class="background-orb orb-b"></div>
    <div class="background-grid"></div>

    <div class="page-shell">
      <header class="hero">
        <div id="heroText" class="hero-copy"></div>
        <div id="heroStats" class="hero-stats"></div>
      </header>

      <main class="workspace">
        <section class="gallery-panel" aria-labelledby="galleryHeading">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Figure Library</p>
              <h2 id="galleryHeading">Browse by analysis type</h2>
            </div>

            <label class="search-field" for="searchInput">
              <span>Search</span>
              <input
                id="searchInput"
                type="search"
                placeholder="Search figures, omics domain, or tags"
                autocomplete="off"
              />
            </label>
          </div>

          <div id="analysisChips" class="chip-row" aria-label="Analysis filters"></div>
          <div id="figureGrid" class="figure-grid" aria-live="polite"></div>
        </section>

        <aside class="inspector-panel" aria-labelledby="inspectorHeading">
          <div class="panel-heading inspector-heading">
            <div>
              <p class="section-kicker">Selected Figure</p>
              <h2 id="inspectorHeading">Live preview</h2>
            </div>
          </div>

          <div id="inspector" class="inspector-body"></div>
        </aside>
      </main>

      <section class="authoring-panel" aria-labelledby="authoringHeading">
        <div class="panel-heading">
          <div>
            <p class="section-kicker">Authoring Workflow</p>
            <h2 id="authoringHeading">Keep each figure self-contained</h2>
          </div>
        </div>

        <div id="authoringGuide" class="authoring-grid"></div>
      </section>
    </div>

    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
