<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Weekly bioinformatics hiring dashboard with skill trend index, history, and a live jobs board."
    />
    <meta name="theme-color" content="#f2ede3" />
    <title>Bioinformatics Hiring Trend Index</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/app.css" />
  </head>
  <body>
    <div class="background-arc arc-a"></div>
    <div class="background-arc arc-b"></div>
    <div class="background-grid"></div>

    <div class="page-shell">
      <header class="hero">
        <div id="heroCopy" class="hero-copy"></div>
        <div id="heroStats" class="hero-stats"></div>
      </header>

      <main class="dashboard-grid">
        <section class="panel trend-panel" aria-labelledby="trendHeading">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Trend Index</p>
              <h2 id="trendHeading">Current skill demand</h2>
            </div>
            <p id="trendMeta" class="panel-note"></p>
          </div>
          <div id="skillIndex" class="skill-index"></div>
        </section>

        <section class="panel history-panel" aria-labelledby="historyHeading">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Weekly History</p>
              <h2 id="historyHeading">Longitudinal signals</h2>
            </div>
            <label class="inline-select" for="historyMetric">
              <span>Metric</span>
              <select id="historyMetric"></select>
            </label>
          </div>
          <div id="historyChart" class="history-chart"></div>
          <div id="historySummary" class="history-summary"></div>
        </section>

        <section class="panel mix-panel" aria-labelledby="mixHeading">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Market Shape</p>
              <h2 id="mixHeading">Role and work-mode mix</h2>
            </div>
            <p class="panel-note">Derived from the current live-role snapshot.</p>
          </div>

          <div class="mix-grid">
            <section>
              <h3>Role families</h3>
              <div id="roleMix" class="bar-stack"></div>
            </section>

            <section>
              <h3>Work modes</h3>
              <div id="modeMix" class="bar-stack"></div>
            </section>

            <section>
              <h3>Observed signals</h3>
              <div id="insightCards" class="insight-grid"></div>
            </section>
          </div>
        </section>

        <section class="panel jobs-panel" aria-labelledby="jobsHeading">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Live Board</p>
              <h2 id="jobsHeading">Current roles</h2>
            </div>
            <p id="jobsMeta" class="panel-note"></p>
          </div>

          <div class="control-grid">
            <label class="control-field" for="searchInput">
              <span>Search</span>
              <input id="searchInput" type="search" placeholder="Company, title, focus area, or skill" autocomplete="off" />
            </label>
            <label class="control-field" for="roleFilter">
              <span>Role family</span>
              <select id="roleFilter"></select>
            </label>
            <label class="control-field" for="modeFilter">
              <span>Work mode</span>
              <select id="modeFilter"></select>
            </label>
            <label class="control-field" for="skillFilter">
              <span>Skill tag</span>
              <select id="skillFilter"></select>
            </label>
          </div>

          <div id="jobGrid" class="job-grid"></div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
